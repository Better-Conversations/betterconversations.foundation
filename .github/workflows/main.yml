# Deploy a new version

name: Build and Deploy


# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  build_and_deploy:
    # The type of runner that the job will run on.
    # Use the organisation's self-hosted runners rather than GitHub-hosted ones.
    runs-on: self-hosted
    environment: local

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          # Astro 7 requires Node 22.12 or newer
          node-version: 22
          
      # Build the documentation and then check the links
      - name: Build Astro site
        run: |
          npm install
          npm run build

      - name: Set up SSH key
        if: github.ref == 'refs/heads/main'
        env:
          SSH_KEY: ${{ secrets.CRUMPET_ACCOUNT_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/crumpet_deploy
          chmod 600 ~/.ssh/crumpet_deploy

      - name: Deploy Site
        if: github.ref == 'refs/heads/main'
        run: |
          # Mirror the built site to crumpet.amphora.cloud, served from ~/public_html
          rsync --delete -vv -r \
            -e 'ssh -i ~/.ssh/crumpet_deploy -p 1970 -o StrictHostKeyChecking=no' \
            dist/ bcf-web@crumpet.amphora.cloud:public_html/
