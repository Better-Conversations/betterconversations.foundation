name: Dependabot auto-merge

# Enables GitHub's native auto-merge on Dependabot pull requests so they merge
# themselves once the "Build and Deploy" pipeline passes.
#
# IMPORTANT - this workflow only *requests* auto-merge. For a PR to actually
# merge ONLY after CI passes, the repository must be configured once via the
# GitHub UI (these cannot be set from a file in the repo):
#
#   1. Settings -> General -> Pull Requests -> tick "Allow auto-merge".
#   2. Settings -> Branches (or Rules) -> protect `main` and mark the
#      "build_and_deploy" status check as REQUIRED. Without a required check,
#      auto-merge merges as soon as the PR is mergeable - it will NOT wait for
#      the build.
#   3. Only if you require PR approvals: Settings -> Actions -> General ->
#      "Allow GitHub Actions to create and approve pull requests", so the
#      approval step below can satisfy the review requirement.
#
# By default only patch and minor updates are auto-merged; major version bumps
# are left for a human to review.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write        # merge the PR
  pull-requests: write   # approve + enable auto-merge

jobs:
  dependabot-auto-merge:
    # Restrict to Dependabot's own PRs. When Dependabot triggers the run the
    # GITHUB_TOKEN honours the elevated `permissions` declared above.
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: self-hosted
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge
        # Skip major version updates - review those by hand.
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          PR_API_URL: ${{ github.event.pull_request.url }}
        run: |
          set -euo pipefail

          # Approve the PR. Best-effort: harmless when reviews aren't required,
          # and needs the "create and approve pull requests" setting when they
          # are. A failure here must not block the run.
          curl -sS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$PR_API_URL/reviews" \
            -d '{"event":"APPROVE"}' \
            || echo "Approval skipped - enable 'Allow GitHub Actions to create and approve pull requests' if branch protection requires a review."

          # Ask GitHub to auto-merge (squash) once required checks pass.
          # enablePullRequestAutoMerge is GraphQL-only; the PR's node_id comes
          # straight from the event payload, so no extra lookup is needed.
          payload=$(printf '{"query":"mutation { enablePullRequestAutoMerge(input: {pullRequestId: \\"%s\\", mergeMethod: SQUASH}) { pullRequest { number } } }"}' "$PR_NODE_ID")

          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/graphql \
            --data "$payload")
          echo "$response"

          if echo "$response" | grep -q '"errors"'; then
            echo "::error::Could not enable auto-merge. Check that 'Allow auto-merge' is on (Settings -> General) and that branch protection on main requires the build_and_deploy check."
            exit 1
          fi
